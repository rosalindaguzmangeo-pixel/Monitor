<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Monitor Senasica</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: sans-serif;
    }

    #viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #zoom-layer {
      position: absolute;
      inset: 0;
      transform-origin: center center;
      transform: translate(0px, 0px) scale(1);
      will-change: transform;
      touch-action: none;
      cursor: grab;
    }

    #zoom-layer.dragging {
      cursor: grabbing;
    }

    #flipbook {
      width: 100vw;
      height: 100vh;
      margin: 0;
    }

    .stf__parent,
    .stf__wrapper {
      width: 100% !important;
      height: 100% !important;
    }

    /* Páginas HTML para evitar la pérdida de calidad del canvas */
    .page {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      image-rendering: auto;
    }

    #resetZoomBtn {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 9999;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    #resetZoomBtn:active {
      transform: scale(0.98);
    }

    /* ===== Visor de imagen original ===== */
    #imageViewer {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: none;
      overflow: hidden;
      z-index: 20000;
      touch-action: none;
    }

    #imageViewer.active {
      display: block;
    }

    #imageViewer img {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: none;
      max-height: none;
      transform: translate(calc(-50% + 0px), calc(-50% + 0px)) scale(1);
      transform-origin: center center;
      user-select: none;
      -webkit-user-drag: none;
      cursor: grab;
      will-change: transform;
    }

    #imageViewer img.dragging {
      cursor: grabbing;
    }

    #closeImageViewer {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 20001;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    #viewerHint {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 20001;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 13px;
      color: #fff;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="zoom-layer">
      <div id="flipbook"></div>
    </div>

    <button id="resetZoomBtn" type="button">Actualizar zoom</button>
  </div>

  <!-- Visor de imagen original -->
  <div id="imageViewer">
    <button id="closeImageViewer" type="button">Cerrar</button>
    <div id="viewerHint">Rueda / pellizca para zoom · arrastra para mover · doble clic para reset</div>
    <img id="zoomedImage" src="" alt="Página ampliada" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

  <script>
    const flipbookElement = document.getElementById("flipbook");
    const viewer = document.getElementById("viewer");
    const zoomLayer = document.getElementById("zoom-layer");
    const resetZoomBtn = document.getElementById("resetZoomBtn");

    const imageViewer = document.getElementById("imageViewer");
    const zoomedImage = document.getElementById("zoomedImage");
    const closeImageViewer = document.getElementById("closeImageViewer");

    let pageFlip = null;
    let pages = [];
    let basePageWidth = 1000;
    let basePageHeight = 1414;
    let resizeTimer = null;

    function imageExists(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      });
    }

    function getImageSize(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          resolve({
            width: img.naturalWidth,
            height: img.naturalHeight
          });
        };
        img.onerror = reject;
        img.src = src;
      });
    }

    async function getPages() {
      const foundPages = [];
      let index = 1;

      while (true) {
        const file = `imagenes/imagen_00${index}.jpg`;
        const exists = await imageExists(file);

        if (!exists) break;

        foundPages.push(file);
        index++;
      }

      return foundPages;
    }

    function buildHtmlPages(pageList) {
      flipbookElement.innerHTML = "";

      pageList.forEach((src, i) => {
        const page = document.createElement("div");
        page.className = "page";
        page.setAttribute("data-page-index", i);

        const img = document.createElement("img");
        img.src = src;
        img.alt = `Página ${i + 1}`;
        img.draggable = false;
        img.loading = "eager";

        page.appendChild(img);
        flipbookElement.appendChild(page);
      });
    }

    async function createFlipbook() {
      if (pageFlip) {
        pageFlip.destroy();
        pageFlip = null;
      }

      flipbookElement.innerHTML = "";
      pages = await getPages();

      if (!pages.length) {
        console.error("No se encontraron imágenes");
        return;
      }

      try {
        const firstSize = await getImageSize(pages[0]);
        basePageWidth = firstSize.width;
        basePageHeight = firstSize.height;
      } catch (error) {
        console.warn("No se pudo obtener el tamaño real de la primera imagen, se usarán dimensiones por defecto.");
        basePageWidth = 1000;
        basePageHeight = 1414;
      }

      buildHtmlPages(pages);

      pageFlip = new St.PageFlip(flipbookElement, {
        width: basePageWidth,
        height: basePageHeight,
        size: "stretch",
        minWidth: 280,
        maxWidth: basePageWidth,
        minHeight: 400,
        maxHeight: basePageHeight,
        usePortrait: true,
        autoSize: false,
        showCover: false,
        mobileScrollSupport: false,
        flippingTime: 800,
        maxShadowOpacity: 0.25,
        swipeDistance: 30,
        clickEventForward: true,
        useMouseEvents: true,
        disableFlipByClick: false
      });

      const htmlPages = flipbookElement.querySelectorAll(".page");
      pageFlip.loadFromHTML(htmlPages);

      pageFlip.on("init", () => {
        forcePortrait();
      });

      pageFlip.on("changeOrientation", () => {
        forcePortrait();
      });
    }

    function forcePortrait() {
      if (pageFlip && typeof pageFlip.updateState === "function") {
        try {
          pageFlip.updateState({ orientation: "portrait" });
        } catch (e) {
          // En algunas versiones puede no aplicar; se ignora.
        }
      }
    }

    createFlipbook();

    // Navegación con teclado
    document.addEventListener("keydown", (e) => {
      if (imageViewer.classList.contains("active")) {
        if (e.key === "Escape") closeOriginalViewer();
        return;
      }

      if (!pageFlip) return;

      if (e.key === "ArrowRight") pageFlip.flipNext();
      if (e.key === "ArrowLeft") pageFlip.flipPrev();

      if (e.key === "z" || e.key === "Z") {
        openOriginalViewer();
      }
    });

    // =========================
    // ZOOM + PAN del flipbook
    // =========================
    let scale = 1;
    const minScale = 1;
    const maxScale = 4; // limitar para evitar blur por escalado excesivo

    let translateX = 0;
    let translateY = 0;

    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startTranslateX = 0;
    let startTranslateY = 0;

    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let pinchCenter = { x: 0, y: 0 };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getBoundsForScale(nextScale) {
      const rect = viewer.getBoundingClientRect();
      const maxX = ((rect.width * nextScale) - rect.width) / 2;
      const maxY = ((rect.height * nextScale) - rect.height) / 2;

      return {
        minX: -maxX,
        maxX: maxX,
        minY: -maxY,
        maxY: maxY
      };
    }

    function applyTransform() {
      const bounds = getBoundsForScale(scale);

      if (scale <= 1) {
        translateX = 0;
        translateY = 0;
      } else {
        translateX = clamp(translateX, bounds.minX, bounds.maxX);
        translateY = clamp(translateY, bounds.minY, bounds.maxY);
      }

      zoomLayer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function zoomTo(newScale, centerX, centerY) {
      const prevScale = scale;
      scale = clamp(newScale, minScale, maxScale);

      if (scale === prevScale) return;

      const rect = viewer.getBoundingClientRect();

      const cx = centerX - rect.left - rect.width / 2;
      const cy = centerY - rect.top - rect.height / 2;
      const scaleRatio = scale / prevScale;

      translateX = (translateX - cx) * scaleRatio + cx;
      translateY = (translateY - cy) * scaleRatio + cy;

      applyTransform();
    }

    function resetZoom() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    resetZoomBtn.addEventListener("click", resetZoom);

    viewer.addEventListener("dblclick", () => {
      if (!imageViewer.classList.contains("active")) {
        openOriginalViewer();
      }
    });

    viewer.addEventListener("wheel", (e) => {
      if (imageViewer.classList.contains("active")) return;
      e.preventDefault();

      const delta = -e.deltaY;
      const zoomStep = delta > 0 ? 0.15 : -0.15;
      zoomTo(scale + zoomStep, e.clientX, e.clientY);
    }, { passive: false });

    viewer.addEventListener("mousedown", (e) => {
      if (imageViewer.classList.contains("active")) return;
      if (scale <= 1) return;

      isDragging = true;
      zoomLayer.classList.add("dragging");
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startTranslateX = translateX;
      startTranslateY = translateY;
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;

      translateX = startTranslateX + (e.clientX - dragStartX);
      translateY = startTranslateY + (e.clientY - dragStartY);
      applyTransform();
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
      zoomLayer.classList.remove("dragging");
    });

    function getDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.hypot(dx, dy);
    }

    function getCenter(t1, t2) {
      return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
      };
    }

    viewer.addEventListener("touchstart", (e) => {
      if (imageViewer.classList.contains("active")) return;

      if (e.touches.length === 2) {
        pinchStartDistance = getDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
        pinchCenter = getCenter(e.touches[0], e.touches[1]);
      } else if (e.touches.length === 1 && scale > 1) {
        isDragging = true;
        zoomLayer.classList.add("dragging");
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        startTranslateX = translateX;
        startTranslateY = translateY;
      }
    }, { passive: true });

    viewer.addEventListener("touchmove", (e) => {
      if (imageViewer.classList.contains("active")) return;

      if (e.touches.length === 2) {
        e.preventDefault();

        const newDistance = getDistance(e.touches[0], e.touches[1]);
        const ratio = newDistance / pinchStartDistance;
        const nextScale = pinchStartScale * ratio;

        zoomTo(nextScale, pinchCenter.x, pinchCenter.y);
        return;
      }

      if (e.touches.length === 1 && isDragging && scale > 1) {
        e.preventDefault();

        translateX = startTranslateX + (e.touches[0].clientX - dragStartX);
        translateY = startTranslateY + (e.touches[0].clientY - dragStartY);
        applyTransform();
      }
    }, { passive: false });

    viewer.addEventListener("touchend", (e) => {
      if (imageViewer.classList.contains("active")) return;

      if (scale <= 1) {
        isDragging = false;
        zoomLayer.classList.remove("dragging");
        return;
      }

      if (e.touches && e.touches.length < 2) {
        pinchStartDistance = 0;
      }

      if (!e.touches || e.touches.length === 0) {
        isDragging = false;
        zoomLayer.classList.remove("dragging");
      }
    });

    window.addEventListener("resize", () => {
      applyTransform();

      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const currentIndex = pageFlip ? pageFlip.getCurrentPageIndex() : 0;

        createFlipbook().then(() => {
          if (pageFlip && typeof currentIndex === "number") {
            try {
              pageFlip.turnToPage(currentIndex);
            } catch (e) {
              // ignorar si la versión no soporta el método
            }
          }
        });
      }, 250);
    });

    // =========================
    // VISOR DE IMAGEN ORIGINAL
    // =========================
    let originalScale = 1;
    const originalMinScale = 1;
    const originalMaxScale = 8;

    let originalX = 0;
    let originalY = 0;

    let originalDragging = false;
    let originalDragStartX = 0;
    let originalDragStartY = 0;
    let originalStartX = 0;
    let originalStartY = 0;

    let originalPinchStartDistance = 0;
    let originalPinchStartScale = 1;
    let originalPinchCenter = { x: 0, y: 0 };

    function applyOriginalTransform() {
      zoomedImage.style.transform =
        `translate(calc(-50% + ${originalX}px), calc(-50% + ${originalY}px)) scale(${originalScale})`;
    }

    function resetOriginalZoom() {
      originalScale = 1;
      originalX = 0;
      originalY = 0;
      applyOriginalTransform();
    }

    function getCurrentPageSrc() {
      if (!pageFlip || !pages.length) return "";
      const index = pageFlip.getCurrentPageIndex();
      return pages[index] || "";
    }

    function openOriginalViewer() {
      const src = getCurrentPageSrc();
      if (!src) return;

      zoomedImage.src = src;
      resetOriginalZoom();
      imageViewer.classList.add("active");
    }

    function closeOriginalViewer() {
      imageViewer.classList.remove("active");
      zoomedImage.src = "";
      originalDragging = false;
      zoomedImage.classList.remove("dragging");
    }

    function originalZoomTo(newScale, centerX, centerY) {
      const prevScale = originalScale;
      originalScale = clamp(newScale, originalMinScale, originalMaxScale);

      if (originalScale === prevScale) return;

      const rect = imageViewer.getBoundingClientRect();
      const cx = centerX - rect.left - rect.width / 2;
      const cy = centerY - rect.top - rect.height / 2;
      const scaleRatio = originalScale / prevScale;

      originalX = (originalX - cx) * scaleRatio + cx;
      originalY = (originalY - cy) * scaleRatio + cy;

      applyOriginalTransform();
    }

    closeImageViewer.addEventListener("click", closeOriginalViewer);

    imageViewer.addEventListener("dblclick", (e) => {
      e.preventDefault();
      resetOriginalZoom();
    });

    imageViewer.addEventListener("wheel", (e) => {
      e.preventDefault();

      const delta = -e.deltaY;
      const zoomStep = delta > 0 ? 0.25 : -0.25;
      originalZoomTo(originalScale + zoomStep, e.clientX, e.clientY);
    }, { passive: false });

    zoomedImage.addEventListener("mousedown", (e) => {
      if (originalScale <= 1) return;

      originalDragging = true;
      zoomedImage.classList.add("dragging");
      originalDragStartX = e.clientX;
      originalDragStartY = e.clientY;
      originalStartX = originalX;
      originalStartY = originalY;
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!originalDragging) return;

      originalX = originalStartX + (e.clientX - originalDragStartX);
      originalY = originalStartY + (e.clientY - originalDragStartY);
      applyOriginalTransform();
    });

    window.addEventListener("mouseup", () => {
      originalDragging = false;
      zoomedImage.classList.remove("dragging");
    });

    imageViewer.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        originalPinchStartDistance = getDistance(e.touches[0], e.touches[1]);
        originalPinchStartScale = originalScale;
        originalPinchCenter = getCenter(e.touches[0], e.touches[1]);
      } else if (e.touches.length === 1 && originalScale > 1) {
        originalDragging = true;
        zoomedImage.classList.add("dragging");
        originalDragStartX = e.touches[0].clientX;
        originalDragStartY = e.touches[0].clientY;
        originalStartX = originalX;
        originalStartY = originalY;
      }
    }, { passive: true });

    imageViewer.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const newDistance = getDistance(e.touches[0], e.touches[1]);
        const ratio = newDistance / originalPinchStartDistance;
        const nextScale = originalPinchStartScale * ratio;

        originalZoomTo(nextScale, originalPinchCenter.x, originalPinchCenter.y);
        return;
      }

      if (e.touches.length === 1 && originalDragging && originalScale > 1) {
        e.preventDefault();

        originalX = originalStartX + (e.touches[0].clientX - originalDragStartX);
        originalY = originalStartY + (e.touches[0].clientY - originalDragStartY);
        applyOriginalTransform();
      }
    }, { passive: false });

    imageViewer.addEventListener("touchend", (e) => {
      if (e.touches.length < 2) {
        originalPinchStartDistance = 0;
      }

      if (e.touches.length === 0) {
        originalDragging = false;
        zoomedImage.classList.remove("dragging");
      }
    });

    applyTransform();
  </script>
</body>
</html>
